services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"

  console:
    image: docker.redpanda.com/redpandadata/console:v3.1.0
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8088:8080"
    depends_on:
      - redpanda
